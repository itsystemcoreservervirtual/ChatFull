<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema de Chat Profesional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0f172a; --bg-side: #1e293b; --accent: #38bdf8; --text-main: #f8fafc; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar-menu { width: 80px; background: #0f172a; border-right: 1px solid #334155; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .avatar-box { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 2px solid var(--accent); overflow: hidden; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .menu-options { display: flex; flex-direction: column; gap: 40px; flex-grow: 1; justify-content: center; font-size: 24px; color: #94a3b8; }
        .menu-options i:hover { color: var(--accent); cursor: pointer; }
        
        .panel { width: 340px; background: var(--bg-side); border-right: 1px solid #334155; display: none; flex-direction: column; }
        .panel.active { display: flex; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 10; }
        .modal-content { background: var(--bg-side); padding: 30px; border-radius: 12px; width: 300px; text-align: center; }
        .btn { padding: 10px; width: 100%; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <nav class="sidebar-menu">
        <div class="avatar-box" onclick="document.getElementById('perfilModal').style.display='flex'">
            <img id="avatarPrincipal" src="https://via.placeholder.com/150" alt="Perfil">
        </div>
        <div class="menu-options">
            <i class="fa-solid fa-message" onclick="mostrarPanel('chats-panel')"></i>
            <i class="fa-solid fa-users" onclick="mostrarPanel('grupos-panel')"></i>
        </div>
        <div class="logout-btn" onclick="window.location.href='/'" style="color:var(--danger); cursor:pointer;"><i class="fa-solid fa-right-from-bracket"></i></div>
    </nav>

    <div id="chats-panel" class="panel active">
        <div style="padding: 20px;"><h3>Mensajería</h3></div>
        <div class="items-list" id="lista-chats"></div>
    </div>

    <div id="grupos-panel" class="panel">
        <div style="padding: 20px;"><h3>Grupos</h3></div>
        <div class="items-list" id="lista-grupos"></div>
    </div>

    <div id="perfilModal" class="modal">
        <div class="modal-content">
            <h3>Mi Perfil</h3>
            <input type="file" id="inputFoto" accept="image/*" style="margin: 15px 0;">
            <input type="text" id="nombreInput" placeholder="Nuevo nombre" style="width:100%; padding:8px; margin-bottom:10px;">
            <button class="btn" style="background:var(--accent);" onclick="guardarPerfil()">Guardar Perfil</button>
            <button class="btn" style="background:var(--danger); color:white;" onclick="confirmarBorrado()">Borrar cuenta permanentemente</button>
            <button class="btn" onclick="document.getElementById('perfilModal').style.display='none'">Cerrar</button>
        </div>
    </div>

    <script>
        function mostrarPanel(idPanel) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(idPanel).classList.add('active');
            
            const lista = document.getElementById(idPanel).querySelector('.items-list');
            if (lista.children.length === 0 && !lista.querySelector('.msg')) {
                lista.innerHTML = `<p class="msg" style="text-align:center; color:#64748b; margin-top:20px;">Sin ${idPanel === 'chats-panel' ? 'chats' : 'grupos'} recientes</p>`;
            }
        }

        function guardarPerfil() {
            const inputFoto = document.getElementById('inputFoto');
            const avatar = document.getElementById('avatarPrincipal');
            
            // Si el usuario seleccionó una imagen, la guardamos temporalmente en el avatar
            if (inputFoto.files && inputFoto.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    avatar.src = e.target.result;
                }
                reader.readAsDataURL(inputFoto.files[0]);
            }
            alert("Perfil guardado con éxito");
            document.getElementById('perfilModal').style.display = 'none';
        }

        function confirmarBorrado() {
            if(confirm("¿Estás seguro de que quieres borrar tu cuenta permanentemente? Esta acción no se puede deshacer.")) {
                window.location.href = '/'; 
            }
        }
    </script>
</body>
</html>
