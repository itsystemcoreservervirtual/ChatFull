<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ecosistema de Chat Profesional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Paleta de colores: Azul marino #000020 y blanco */
        :root { 
            --nav-bg: #000020; 
            --panel-bg: #000020; 
            --accent: #000020; /* Botones ahora azul marino */
            --text-color: #ffffff; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; color: var(--text-color); }
        body { background: #0f172a; height: 100vh; display: flex; overflow: hidden; }

        .sidebar-menu { width: 80px; background: #000020; border-right: 1px solid #334155; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        
        /* Paneles de Mensajes y Grupos */
        .panel { width: 340px; background: var(--panel-bg); border-right: 1px solid #334155; display: none; flex-direction: column; padding: 20px; }
        .panel.active { display: flex; }
        
        /* Mensajes de estado vacío */
        .empty-state { text-align: center; margin-top: 50px; color: #94a3b8; font-size: 0.9rem; }
        
        /* Botones de Perfil */
        .btn { padding: 10px; width: 100%; border: 1px solid #ffffff; border-radius: 6px; cursor: pointer; margin-top: 10px; background: var(--accent); color: white; text-align: center; }
        
        /* Modal */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 10; justify-content: center; align-items: center; }
        .modal-content { background: var(--panel-bg); padding: 30px; border-radius: 12px; width: 320px; text-align: center; border: 1px solid #ffffff; }
    </style>
</head>
<body>

    <nav class="sidebar-menu">
        <i class="fa-solid fa-message" style="margin-bottom: 40px; cursor: pointer;" onclick="mostrarPanel('chats-panel')"></i>
        <i class="fa-solid fa-users" style="cursor: pointer;" onclick="mostrarPanel('grupos-panel')"></i>
    </nav>

    <div id="chats-panel" class="panel active">
        <h3>Mensajería</h3>
        <div id="lista-chats" class="empty-state">Sin chats recientes</div>
    </div>

    <div id="grupos-panel" class="panel">
        <h3>Grupos</h3>
        <div id="lista-grupos" class="empty-state">Sin grupos recientes</div>
    </div>

    <script>
        // Función para cambiar entre paneles
        function mostrarPanel(idPanel) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(idPanel).classList.add('active');
        }

        // Lógica para mostrar usuarios/grupos dinámicamente
        // Si necesitas que los grupos aparezcan solo a los agregados, 
        // filtrarías un array antes de renderizar.
        function cargarDatos() {
            const chats = []; // Aquí irían tus usuarios nuevos
            const grupos = []; // Aquí filtrarías grupos por usuario

            if (chats.length === 0) {
                document.getElementById('lista-chats').innerHTML = "Sin chats recientes";
            }
            
            if (grupos.length === 0) {
                document.getElementById('lista-grupos').innerHTML = "Sin grupos recientes";
            }
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
