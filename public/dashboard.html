<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ecosistema de Chat Profesional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0f172a; --panel-bg: #000020; --text: #ffffff; --accent: #38bdf8; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; color: var(--text); }
        body { background: var(--bg-main); height: 100vh; display: flex; overflow: hidden; }

        .sidebar-menu { width: 80px; background: #0f172a; border-right: 1px solid #334155; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .avatar-box { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 2px solid var(--accent); overflow: hidden; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .menu-options { display: flex; flex-direction: column; gap: 40px; margin-top: 30px; font-size: 24px; color: #94a3b8; }

        .panel { width: 340px; background: var(--panel-bg); display: none; flex-direction: column; padding: 20px; border-right: 1px solid #334155; }
        .panel.active { display: flex; }
        .empty-msg { text-align: center; color: #94a3b8; margin-top: 20px; font-style: italic; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 10; justify-content: center; align-items: center; }
        .modal-content { background: var(--panel-bg); padding: 30px; border-radius: 12px; width: 320px; text-align: center; position: relative; border: 1px solid #334155; }
        .close-x { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 24px; color: var(--text); }
        
        .btn { padding: 10px; width: 100%; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; background: var(--panel-bg); border: 1px solid var(--accent); }
        .btn-danger { border: 1px solid var(--danger); color: var(--danger); }
    </style>
</head>
<body>

    <nav class="sidebar-menu">
        <div class="avatar-box" onclick="document.getElementById('perfilModal').style.display='flex'">
            <img id="avatarPrincipal" src="https://via.placeholder.com/150" alt="Perfil">
        </div>
        <div class="menu-options">
            <i class="fa-solid fa-message" onclick="mostrarPanel('chats-panel')"></i>
            <i class="fa-solid fa-users" onclick="mostrarPanel('grupos-panel')"></i>
        </div>
    </nav>

    <div id="chats-panel" class="panel active">
        <h3>Mensajería</h3>
        <div id="lista-chats" class="empty-msg">Sin chats recientes</div>
    </div>

    <div id="grupos-panel" class="panel">
        <h3>Grupos</h3>
        <div id="lista-grupos" class="empty-msg">Sin grupos recientes</div>
    </div>

    <div id="perfilModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="document.getElementById('perfilModal').style.display='none'">✕</span>
            <h3>Mi Perfil</h3>
            <button class="btn" onclick="document.getElementById('inputFoto').click()">Cambiar foto</button>
            <input type="file" id="inputFoto" hidden onchange="cambiarFoto(event)">
            <button class="btn btn-danger" onclick="borrarCuenta()">Borrar cuenta permanentemente</button>
        </div>
    </div>

    <script>
        function mostrarPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function cambiarFoto(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('avatarPrincipal').src = ev.target.result;
                localStorage.setItem('userAvatar', ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function borrarCuenta() {
            if(confirm("¿Seguro? Se perderá todo: fotos, chats y grupos.")) {
                localStorage.clear();
                alert("Cuenta eliminada. Reiniciando...");
                window.location.reload();
            }
        }

        // Carga inicial
        window.onload = () => {
            const foto = localStorage.getItem('userAvatar');
            if(foto) document.getElementById('avatarPrincipal').src = foto;
        }
    </script>
</body>
</html>
