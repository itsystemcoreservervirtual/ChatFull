<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema de Chat Profesional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0f172a; --bg-side: #1e293b; --accent: #38bdf8; --text-main: #f8fafc; --text-muted: #94a3b8; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar-menu { width: 80px; background: #0f172a; border-right: 1px solid #334155; display: flex; flex-direction: column; align-items: center; padding: 20px 0; justify-content: space-between; }
        .menu-options { display: flex; flex-direction: column; gap: 25px; font-size: 20px; color: var(--text-muted); }
        .menu-options i { cursor: pointer; transition: 0.2s; }
        .menu-options i:hover { color: var(--accent); }
        
        /* Paneles */
        .panel { width: 340px; background: var(--bg-side); border-right: 1px solid #334155; display: none; flex-direction: column; }
        .panel.active { display: flex; }
        .panel-header { padding: 20px; border-bottom: 1px solid #334155; }
        .items-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* Estado vacío */
        .mensaje-vacio { color: var(--text-muted); text-align: center; margin-top: 50px; font-style: italic; }
        
        /* Ventana Chat (Viewport) */
        .chat-viewport { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        .logout-btn { color: var(--danger); cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <nav class="sidebar-menu">
        <div class="menu-options">
            <i class="fa-solid fa-message" title="Chats" onclick="mostrarPanel('chats-panel')"></i>
            <i class="fa-solid fa-users" title="Grupos" onclick="mostrarPanel('grupos-panel')"></i>
        </div>
        <div class="logout-btn" onclick="window.location.href='/'"><i class="fa-solid fa-right-from-bracket"></i></div>
    </nav>

    <div id="chats-panel" class="panel active">
        <div class="panel-header"><h3>Mensajería</h3></div>
        <div class="items-list" id="lista-chats"></div>
    </div>

    <div id="grupos-panel" class="panel">
        <div class="panel-header"><h3>Grupos</h3></div>
        <div class="items-list" id="lista-grupos"></div>
    </div>

    <main class="chat-viewport">
        <div style="padding: 40px; text-align: center; color: var(--text-muted);">
            Selecciona un chat o grupo para comenzar.
        </div>
    </main>

    <script>
        function mostrarPanel(idPanel) {
            // 1. Ocultar todos los paneles
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            // 2. Mostrar el seleccionado
            const panel = document.getElementById(idPanel);
            panel.classList.add('active');

            // 3. Lógica de "Vacio"
            const lista = panel.querySelector('.items-list');
            
            // Si la lista está vacía y no tiene el mensaje, lo agregamos
            if (lista.children.length === 0 && !panel.querySelector('.mensaje-vacio')) {
                const msg = document.createElement('p');
                msg.className = 'mensaje-vacio';
                msg.innerText = (idPanel === 'chats-panel') ? "Sin chats recientes" : "Sin grupos recientes";
                lista.appendChild(msg);
            }
        }
    </script>
</body>
</html>
