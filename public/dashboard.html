<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard ChatFriends</title>
    <style>
        /* Estilos básicos para que los paneles funcionen */
        .chats-panel, .grupos-panel {
            display: none;
            padding: 20px;
            color: white;
        }
        /* Mostrar el de chats por defecto */
        #chats-panel { display: block; }
        
        .sidebar-menu { width: 60px; background: #1a222c; height: 100vh; position: fixed; }
        .menu-options { margin-top: 20px; text-align: center; }
        .menu-options div { margin-bottom: 20px; cursor: pointer; color: white; font-size: 20px; }
        .logout-btn { position: absolute; bottom: 20px; left: 20px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="sidebar-menu">
        <div class="avatar-container" onclick="openModal('profileModal')">
            <img src="https://via.placeholder.com/50" alt="Mi Perfil">
        </div>
        
        <div class="menu-options">
            <div onclick="mostrarPanel('chats-panel')">
                <i class="fa-solid fa-message" title="Chats"></i>
            </div>
            <div onclick="mostrarPanel('grupos-panel')">
                <i class="fa-solid fa-users" title="Grupos"></i>
            </div>
        </div>

        <div class="logout-btn" onclick="window.location.href='/'" title="Cerrar Sesión">
            <i class="fa-solid fa-right-from-bracket"></i>
        </div>
    </div>

    <div style="margin-left: 60px;">
        <div id="chats-panel" class="chats-panel">
            <h1>Panel de Chats</h1>
            <p>Aquí verás tus conversaciones.</p>
        </div>

        <div id="grupos-panel" class="grupos-panel">
            <h1>Panel de Grupos</h1>
            <p>Aquí verás tus grupos y amigos.</p>
        </div>
    </div>

    <div class="modal" id="profileModal" style="display:none;">
        <div class="modal-content">
            <h3>Mi Perfil de Usuario</h3>
            <button onclick="closeModal('profileModal')">Cerrar</button>
        </div>
    </div>

    <script>
        function mostrarPanel(idPanel) {
            // Ocultar todos los paneles
            document.getElementById('chats-panel').style.display = 'none';
            document.getElementById('grupos-panel').style.display = 'none';
            
            // Mostrar el seleccionado
            const seleccionado = document.getElementById(idPanel);
            if(seleccionado) {
                seleccionado.style.display = 'block';
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
