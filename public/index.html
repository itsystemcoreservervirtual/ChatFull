<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - Chat Profesional</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-container { background: #1e293b; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; text-align: center; color: #38bdf8; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; outline: none; font-size: 14px; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #0369a1; }
        .toggle-form { margin-top: 20px; text-align: center; font-size: 14px; color: #94a3b8; cursor: pointer; }
        .toggle-form span { color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2 id="authTitle">Iniciar Sesión</h2>
        <form id="authForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="username"> Nombre de Usuario</label>
                <input type="text" id="username" required placeholder=" Escribe tu usuario">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="Escribe tu contraseña">
            </div>
            <button type="submit" id="authBtn">Ingresar al Sistema</button>
        </form>
        <div class="toggle-form" onclick="toggleMode()">
            <p id="toggleText">¿No tienes cuenta? <span>Regístrate aquí</span></p>
        </div>
    </div>

    <script>
        let isLogin = true;
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? 'Iniciar Sesión' : 'Registro de Usuario';
            document.getElementById('authBtn').innerText = isLogin ? 'Ingresar al Sistema' : 'Crear Cuenta Nueva';
            document.getElementById('toggleText').innerHTML = isLogin ? '¿No tienes cuenta? <span>Regístrate aquí</span>' : '¿Ya tienes cuenta? <span>Inicia sesión</span>';
        }
        function handleSubmit(event) {
            event.preventDefault();
            // Aquí irá la redirección al dashboard tras validar con el servidor
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
